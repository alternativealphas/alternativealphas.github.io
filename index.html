<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AA &middot; Technology Consulting</title>
    <meta
      name="description"
      content="A boutique consultancy providing technology consulting, business data analysis, and IT support services for corporate clients."
    />
    <link id="favicon" rel="icon" type="image/jpeg" href="logo_b.jpg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
    <style>
        :root {
            --transition-speed: 1.2s;
            --font-main: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
            --font-display: 'Cormorant Garamond', 'Times New Roman', Georgia, serif;
        }

        /* Theme Definitions */
        body.theme-light {
            --bg: #f8f6f2;
            --text: #1a1a1a;
            --accent: #8b5e3c; /* Copper/Ink accent */
            --mesh-color: rgba(139, 94, 60, 0.15);
            --btn-bg: #1a1a1a;
            --btn-text: #ffffff;
        }

        body.theme-dark {
            --bg: #0a0a0b;
            --text: #e0e0e0;
            --accent: #c5a059; /* Gold/Bronze accent */
            --mesh-color: rgba(197, 160, 89, 0.2);
            --btn-bg: #e0e0e0;
            --btn-text: #0a0a0b;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            font-family: var(--font-main);
            background-color: var(--bg);
            color: var(--text);
            transition: background-color var(--transition-speed) cubic-bezier(0.4, 0, 0.2, 1);
            overflow-x: hidden;
            overflow-y: auto;
        }

        /* Dynamic Mesh Background */
        #mesh-canvas {
            position: fixed;
            top: 0; left: 0;
            z-index: 1;
            pointer-events: none;
        }

        .content-layer {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            min-height: 100vh;
            box-sizing: border-box;
            padding: clamp(160px, 24vh, 280px) 8% 80px;
        }

        /* Brand & Logo Layout */
        .brand-header {
            position: relative;
            top: 40px;
            left: 7%;
            width: 280px;
            opacity: 0.8;
        }

        .brand-img { width: 100%; height: auto; display: none; }

        .hero-section { max-width: 800px; }

        h1 {
            font-family: var(--font-display);
            font-size: clamp(2.3rem, 4.6vw, 3.7rem);
            font-weight: 300;
            line-height: 1.08;
            margin: 0 0 1.6rem 0;
            letter-spacing: -0.005em;
            opacity: 0.95;
        }

        h1 em {
            font-style: italic;
            font-weight: 300;
            color: var(--accent);
        }

        .alpha-accent {
            display: none;
            height: 100%;
            width: auto;
            max-width: 56px;
            align-self: stretch;
            object-fit: contain;
            opacity: 0.6;
            flex-shrink: 0;
        }

        .description-row {
            display: flex;
            align-items: stretch;
            gap: 16px;
            max-width: 600px;
            margin-bottom: 3rem;
        }

        .description {
            font-family: var(--font-main);
            font-size: 0.92rem;
            font-weight: 300;
            line-height: 1.6;
            letter-spacing: 0.01em;
            opacity: 0.7;
            margin: 0;
            border-left: 1px solid var(--accent);
            padding-left: 22px;
        }

        .tagline {
            display: inline-block;
            font-size: 0.7rem;
            letter-spacing: 0.22em;
            text-transform: uppercase;
            font-weight: 480;
            opacity: 0.55;
            margin-bottom: 1.6rem;
            color: var(--accent);
        }

        .cta {
            padding: 16px 32px;
            background: var(--btn-bg);
            color: var(--btn-text);
            text-decoration: none;
            text-transform: uppercase;
            font-size: 0.7rem;
            letter-spacing: 0.2em;
            font-weight: 480;
            transition: 0.3s;
        }

        .cta:hover { transform: scale(1.05); opacity: 0.9; }

        footer {
            position: absolute;
            bottom: 40px;
            right: 8%;
            font-size: 0.7rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            opacity: 0.0;
        }

        .copyright {
            position: absolute;
            bottom: 16px;
            right: 8%;
            z-index: 10;
            font-size: 0.6rem;
            letter-spacing: 0.05em;
            opacity: 0.5;
            color: var(--text);
            white-space: nowrap;
            pointer-events: none;
        }

        .logo {
        height: 40px;
        margin-right: 0.5rem;
      }
    </style>
</head>
<body id="main-body">
    <canvas id="mesh-canvas"></canvas>

    <div class="brand-header">
        <img src="brand_w.jpg" id="brand-white" class="brand-img" alt="Logo">
        <img src="brand_b.jpg" id="brand-black" class="brand-img" alt="Logo">
    </div>

    <main class="content-layer">
        <div class="hero-section">
            <span class="tagline">Technology Consulting &middot; Business Data Analysis &middot; IT Support</span>
            <h1>A boutique consultancy for <em>technology,</em> <em>data,</em> and <em>IT operations.</em></h1>
            <div class="description-row">
                <img src="logo_w.jpg" id="logo-white" class="alpha-accent" alt="Alpha">
                <img src="logo_b.jpg" id="logo-black" class="alpha-accent" alt="Alpha">
                <p class="description">We help corporate clients improve their operations through technology consulting, business data analysis, and IT support services.</p>
            </div>
            <a href="mailto:info@alternativealphas.com" class="cta">Get in Touch</a>
        </div>
    </main>

    <footer id="time-footer"></footer>
    <div class="copyright" id="copyright"></div>

    <script>
        const canvas = document.getElementById('mesh-canvas');
        const ctx = canvas.getContext('2d');
        let points = [];

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        class Point {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.vx = (Math.random() - 0.5) * 0.5;
                this.vy = (Math.random() - 0.5) * 0.5;
            }
            update() {
                this.x += this.vx; this.y += this.vy;
                if(this.x < 0 || this.x > canvas.width) this.vx *= -1;
                if(this.y < 0 || this.y > canvas.height) this.vy *= -1;
            }
        }

        function init() {
            points = Array.from({length: 40}, () => new Point());
            animate();
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const color = getComputedStyle(document.body).getPropertyValue('--mesh-color');
            ctx.strokeStyle = color;
            ctx.fillStyle = color;

            points.forEach(p => {
                p.update();
                ctx.beginPath();
                ctx.arc(p.x, p.y, 2, 0, Math.PI*2);
                ctx.fill();
            });

            for(let i=0; i<points.length; i++) {
                for(let j=i+1; j<points.length; j++) {
                    const dist = Math.hypot(points[i].x - points[j].x, points[i].y - points[j].y);
                    if(dist < 250) {
                        ctx.lineWidth = 1 - dist/250;
                        ctx.beginPath();
                        ctx.moveTo(points[i].x, points[i].y);
                        ctx.lineTo(points[j].x, points[j].y);
                        ctx.stroke();
                    }
                }
            }
            requestAnimationFrame(animate);
        }

        function updateTheme() {
            const hkTime = new Intl.DateTimeFormat('en-GB', {timeZone: 'Asia/Hong_Kong', hour: 'numeric', hour12: false}).format(new Date());
            const hour = parseInt(hkTime);
            const isDay = (hour >= 9 && hour < 21);
            const favicon = document.getElementById('favicon');

            favicon.href = isDay ? 'logo_w.jpg' : 'logo_b.jpg';
            document.body.className = isDay ? 'theme-light' : 'theme-dark';
            document.getElementById('brand-white').style.display = isDay ? 'block' : 'none';
            document.getElementById('brand-black').style.display = isDay ? 'none' : 'block';
            document.getElementById('logo-white').style.display = isDay ? 'block' : 'none';
            document.getElementById('logo-black').style.display = isDay ? 'none' : 'block';
            document.getElementById('time-footer').innerText = `${hkTime}:00 | ${isDay ? 'Day Session' : 'Night Session'}`;
        }

        document.getElementById('copyright').innerText = `\u00A9 ${new Date().getFullYear()} AA`;

        window.addEventListener('resize', resize);
        resize();
        init();
        updateTheme();
        setInterval(updateTheme, 60000);
    </script>
</body>
</html>
