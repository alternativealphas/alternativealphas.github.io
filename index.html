<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Alternative Alphas</title>
    <meta
      name="description"
      content="Alternative Alphas helps investors find differentiated, high-conviction alternative investment opportunities through research, strategy, and execution."
    />
    <link rel="icon" type="image/jpeg" href="logo.jpg" />
    <link rel="apple-touch-icon" href="logo.jpg" />
    <style>
      :root {
        --bg: #0f172a;
        --surface: #111827;
        --accent: #7c3aed;
        --accent-light: #a78bfa;
        --text: #e2e8f0;
        --muted: #94a3b8;
        --border: rgba(148, 163, 184, 0.18);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #000;
        color: var(--text);
      }

      html {
        scroll-behavior: smooth;
      }

      .page {
        width: min(1200px, calc(100% - 2rem));
        margin: 0 auto;
        padding: 2rem 0 4rem;
      }

      header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 1rem;
        padding: 1rem 0;
      }

      .brand {
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: #fff;
        display: flex;
        align-items: center;
      }

      .logo {
        height: 40px;
        margin-right: 0.5rem;
      }

      .nav {
        display: flex;
        gap: 1.5rem;
        flex-wrap: wrap;
      }

      .nav a {
        color: var(--muted);
        text-decoration: none;
        font-size: 0.95rem;
      }

      .nav a:hover {
        color: var(--text);
      }

      .hero {
        display: grid;
        grid-template-columns: 1.2fr 0.8fr;
        gap: 2rem;
        align-items: center;
        padding: 4rem 0 3rem;
      }

      .hero-copy {
        max-width: 640px;
      }

      h1 {
        font-size: clamp(3rem, 4vw, 4.5rem);
        line-height: 1.02;
        margin: 0;
      }

      .eyebrow {
        text-transform: uppercase;
        letter-spacing: 0.18em;
        color: var(--accent);
        font-size: 0.8rem;
        margin-bottom: 1rem;
      }

      p.lead {
        color: var(--muted);
        font-size: 1.05rem;
        line-height: 1.85;
        margin: 1.5rem 0 2.5rem;
      }

      .buttons {
        display: flex;
        flex-wrap: wrap;
        gap: 1rem;
      }

      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 0.95rem 1.75rem;
        border-radius: 999px;
        border: 1px solid transparent;
        font-weight: 600;
        text-decoration: none;
        transition: transform 0.2s ease, background-color 0.2s ease, color 0.2s ease;
      }

      .btn-primary {
        background: linear-gradient(135deg, var(--accent), #4c1d95);
        color: white;
      }

      .btn-secondary {
        background: transparent;
        color: var(--text);
        border-color: var(--border);
      }

      .btn:hover {
        transform: translateY(-1px);
      }

      .hero-visual {
        padding: 2rem;
        border: 1px solid var(--border);
        border-radius: 30px;
        background: rgba(15, 23, 42, 0.8);
        box-shadow: 0 40px 120px rgba(15, 23, 42, 0.35);
      }

      .stats {
        display: grid;
        gap: 1rem;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        margin-top: 1.5rem;
      }

      .stat-card {
        padding: 1.25rem;
        border-radius: 24px;
        border: 1px solid rgba(255, 255, 255, 0.05);
        background: rgba(255, 255, 255, 0.03);
      }

      .stat-card strong {
        display: block;
        font-size: 1.7rem;
        margin-bottom: 0.35rem;
      }

      .section {
        padding: 3rem 0;
      }

      .section-title {
        display: flex;
        align-items: center;
        gap: 0.85rem;
        margin-bottom: 1.5rem;
      }

      .section-title span {
        display: inline-flex;
        width: 10px;
        height: 10px;
        border-radius: 999px;
        background: var(--accent);
      }

      .section-title h2 {
        margin: 0;
        font-size: 2rem;
      }

      .cards {
        display: grid;
        gap: 1.5rem;
      }

      .card {
        padding: 1.75rem;
        border-radius: 28px;
        border: 1px solid rgba(255, 255, 255, 0.06);
        background: rgba(255, 255, 255, 0.025);
      }

      .card h3 {
        margin: 0 0 0.75rem;
        font-size: 1.2rem;
      }

      .card p {
        margin: 0;
        line-height: 1.8;
        color: var(--muted);
      }

      .cta-banner {
        padding: 2rem;
        border-radius: 30px;
        background: linear-gradient(135deg, rgba(124, 58, 237, 0.22), rgba(15, 23, 42, 0.95));
        border: 1px solid rgba(124, 58, 237, 0.16);
      }

      .cta-banner h2 {
        margin: 0 0 0.75rem;
      }

      .footer {
        padding-top: 2rem;
        border-top: 1px solid rgba(148, 163, 184, 0.12);
        display: flex;
        justify-content: space-between;
        flex-wrap: wrap;
        gap: 1rem;
      }

      .footer p {
        margin: 0;
        color: var(--muted);
      }

      @media (max-width: 840px) {
        .hero {
          grid-template-columns: 1fr;
        }

        .hero-visual {
          order: -1;
        }
      }

      @media (max-width: 640px) {
        .page {
          padding: 1.5rem 0 3rem;
        }

        .nav {
          justify-content: flex-start;
        }

        .stats {
          grid-template-columns: 1fr;
        }

        .logo {
          height: 30px;
        }
      }
    </style>
  </head>
  <body>
    <div class="page">
      <header>
        <div class="brand">
          <img src="logo.jpg" alt="Alternative Alphas Logo" class="logo">
          Alternative Alphas
        </div>
      </header>
    </div>
  </body>
</html>
